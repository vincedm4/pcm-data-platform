<!-- PRO CAPITAL DATA — COMMANDER DASHBOARD v1                                  -->
<!-- Separate from portal.html (which serves paying insurance agency clients). -->
<!-- This page serves internal team only: Vincent (Commander), Harry, Giovanni. -->
<!-- Access: PIN-based, hashed (SHA-256), verified against system_controls table.-->
<!-- Default scope per role (Commander's explicit direction):                  -->
<!--   harry    -> procurement + grants                                       -->
<!--   giovanni -> leads (his insurance agency floor)                         -->
<!--   commander -> everything                                                -->
<!-- extra_access field allows Commander to temporarily expand someone's view  -->
<!-- (e.g. before a business trip) by editing one row in Supabase directly —  -->
<!-- no code changes needed for that.                                         -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Capital Data — Commander Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  --blue: #1E40AF; --blue-lt: #4169E8; --blue-gl: rgba(30,64,175,.10);
  --teal: #00D4AA; --gold: #FFBA08; --red: #EF4444; --green: #00C97A;
  --dark: #02050A; --ink: #0A0F1E; --off: #F4F6FB; --border: #E2E8F0;
  --muted: #5A6580; --mono: 'JetBrains Mono', monospace; --sans: 'DM Sans', sans-serif;
  --display: 'Bebas Neue', sans-serif;
  font-family: var(--sans); background: var(--off); color: var(--ink);
  min-height: 100vh; padding: 24px 16px;
}
.wrap { max-width: 720px; margin: 0 auto; }
.card {
  background: #fff; border-radius: 16px; padding: 32px;
  box-shadow: 0 8px 30px rgba(10,15,30,.08); border: 1px solid var(--border);
  margin-bottom: 20px;
}
h1 { font-family: var(--display); font-size: 28px; letter-spacing: 1px; margin-bottom: 4px; }
.sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
.lbl { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; color: var(--muted); margin-bottom: 6px; display: block; }
input {
  width: 100%; padding: 14px 16px; border: 1.5px solid var(--border); border-radius: 10px;
  font-size: 16px; outline: none; margin-bottom: 14px; font-family: var(--mono);
  letter-spacing: 2px; text-align: center;
}
input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-gl); }
button {
  width: 100%; padding: 15px; background: var(--blue); color: #fff; border: none;
  border-radius: 10px; font-family: var(--display); font-size: 18px; letter-spacing: 1px;
  cursor: pointer; transition: transform .15s;
}
button:hover { transform: translateY(-1px); }
button:disabled { opacity: .5; cursor: not-allowed; }
.err { color: var(--red); font-size: 13px; margin-top: -6px; margin-bottom: 12px; display: none; }
.err.on { display: block; }

.section-ttl {
  font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.2px;
  color: var(--muted); margin: 28px 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
}
.section-ttl:first-child { margin-top: 0; }

.row {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 14px 0; border-bottom: 1px solid var(--border); gap: 12px;
}
.row:last-child { border-bottom: none; }
.row-main { flex: 1; }
.row-title { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
.sol-id { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.sol-link {
  display: inline-block; font-size: 12px; font-weight: 700; color: var(--blue);
  text-decoration: none; margin-top: 6px;
}
.sol-link:hover { text-decoration: underline; }
.row-summary { font-size: 13px; color: var(--muted); line-height: 1.5; }
.row-meta { text-align: right; flex-shrink: 0; }
.deadline { font-family: var(--mono); font-size: 12px; font-weight: 700; }
.deadline.soon { color: var(--red); }
.tag {
  display: inline-block; font-size: 10px; font-weight: 700; text-transform: uppercase;
  padding: 3px 8px; border-radius: 5px; margin-top: 4px; letter-spacing: .5px;
}
.tag.clothing { background: #EFF6FF; color: var(--blue); }
.tag.subsistence { background: #ECFDF5; color: #047857; }
.tag.petroleum { background: #FFF7ED; color: #C2410C; }
.tag.medical { background: #FDF2F8; color: #BE185D; }
.tag.eligible { background: #ECFDF5; color: #047857; }
.tag.review { background: #FEF3C7; color: #92400E; }

.empty { text-align: center; color: var(--muted); font-size: 13px; padding: 24px; }
.loading { text-align: center; color: var(--muted); font-size: 13px; padding: 24px; }
.header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.logout-link { font-size: 12px; color: var(--muted); cursor: pointer; text-decoration: underline; }
.role-badge {
  display: inline-block; font-family: var(--mono); font-size: 11px; font-weight: 700;
  background: var(--blue-gl); color: var(--blue); padding: 4px 10px; border-radius: 6px;
  margin-bottom: 20px; letter-spacing: .5px; text-transform: uppercase;
}
</style>
</head>
<body>

<div class="wrap">

  <!-- ═══════════ LOGIN VIEW ═══════════ -->
  <div id="view-login" class="card">
    <h1>PRO CAPITAL DATA</h1>
    <p class="sub">Commander Dashboard — Enter your PIN</p>
    <label class="lbl">PIN</label>
    <input type="password" id="pin-input" inputmode="numeric" maxlength="8" placeholder="••••" autocomplete="off">
    <div class="err" id="login-err">Incorrect PIN. Please try again.</div>
    <button id="login-btn" onclick="doLogin()">ENTER</button>
  </div>

  <!-- ═══════════ DASHBOARD VIEW ═══════════ -->
  <div id="view-dashboard" style="display:none;">
    <div class="card">
      <div class="header-bar">
        <h1 id="welcome-name">Welcome</h1>
        <span class="logout-link" onclick="doLogout()">Log out</span>
      </div>
      <div class="role-badge" id="role-badge">Role</div>
    </div>

    <div class="card" id="section-procurement" style="display:none;">
      <div class="section-ttl">Procurement &amp; Solicitations</div>
      <div id="procurement-list" class="loading">Loading…</div>
    </div>

    <div class="card" id="section-grants" style="display:none;">
      <div class="section-ttl">Grant Opportunities</div>
      <div id="grants-list" class="loading">Loading…</div>
    </div>

    <div class="card" id="section-auctions" style="display:none;">
      <div class="section-ttl">GSA Surplus Auctions — Vehicles (FL/TX)</div>
      <div id="auctions-list" class="loading">Loading…</div>
    </div>

    <div class="card" id="section-leads" style="display:none;">
      <div class="section-ttl">Insurance Agency Leads</div>
      <div id="leads-list" class="loading">Loading…</div>
    </div>
  </div>

</div>

<script>
(function() {
  const SUPABASE_URL = "https://soyavidxbcxmifwnshhh.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_MBr27IBzEDWbvWOEwr8xTg_rKfRkPfR"; // safe to expose — publishable key only
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentUser = null; // { id, role, extra_access }

  async function sha256Hex(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  async function doLogin() {
    const pin = document.getElementById('pin-input').value.trim();
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('login-err');
    errEl.classList.remove('on');

    if (!pin) return;
    btn.disabled = true; btn.textContent = 'CHECKING…';

    try {
      const pinHash = await sha256Hex(pin);
      const { data, error } = await sb
        .from('system_controls')
        .select('id, role, pin_hash, extra_access')
        .eq('pin_hash', pinHash)
        .maybeSingle();

      if (error || !data) {
        errEl.classList.add('on');
        btn.disabled = false; btn.textContent = 'ENTER';
        return;
      }

      currentUser = data;
      showDashboard();
    } catch (e) {
      errEl.classList.add('on');
      btn.disabled = false; btn.textContent = 'ENTER';
    }
  }

  function showDashboard() {
    document.getElementById('view-login').style.display = 'none';
    document.getElementById('view-dashboard').style.display = 'block';

    const nameMap = { commander: 'Vincent', harry: 'Harry', giovanni: 'Giovanni' };
    document.getElementById('welcome-name').textContent = 'Welcome, ' + (nameMap[currentUser.id] || currentUser.id);
    document.getElementById('role-badge').textContent = currentUser.role || currentUser.id;

    const extra = Array.isArray(currentUser.extra_access) ? currentUser.extra_access : [];
    const role = currentUser.role || currentUser.id;

    const showProcurement = role === 'commander' || role === 'harry' || extra.includes('procurement');
    const showGrants      = role === 'commander' || role === 'harry' || extra.includes('grants');
    const showAuctions    = true; // Commander's direction: GSA Auctions visible to everyone by default
    const showLeads       = role === 'commander' || role === 'giovanni' || extra.includes('leads');

    if (showProcurement) { document.getElementById('section-procurement').style.display = 'block'; loadProcurement(); }
    if (showGrants)      { document.getElementById('section-grants').style.display = 'block'; loadGrants(); }
    if (showAuctions)    { document.getElementById('section-auctions').style.display = 'block'; loadAuctions(); }
    if (showLeads)        { document.getElementById('section-leads').style.display = 'block'; loadLeads(); }
  }

  function daysUntil(dateStr) {
    if (!dateStr) return null;
    const d = new Date(dateStr);
    const now = new Date();
    return Math.ceil((d - now) / (1000 * 60 * 60 * 24));
  }

  async function loadProcurement() {
    const box = document.getElementById('procurement-list');
    try {
      const todayIso = new Date().toISOString().slice(0, 10);
      const verticals = ['CLOTHING', 'SUBSISTENCE', 'PETROLEUM', 'MEDICAL'];

      // Query each vertical SEPARATELY with its own small limit, so
      // one urgent category (e.g. items expiring soon) can never
      // crowd out the others — confirmed real issue: Medical's
      // soon-expiring items were filling the entire combined limit
      // before Petroleum/Clothing/Subsistence ever got a chance to show.
      const results = await Promise.all(verticals.map(v =>
        sb.from('pcm_procurement_pipeline')
          .select('solicitation_id, title, plain_summary, deadline, vertical, is_relevant, action_url')
          .eq('is_relevant', true)
          .eq('vertical', v)
          .gte('deadline', todayIso)
          .order('deadline', { ascending: true })
          .limit(8)
      ));

      let allRows = [];
      results.forEach(r => { if (r.data) allRows = allRows.concat(r.data); });
      // Re-sort the combined set by deadline for display, while still
      // guaranteeing each vertical got its own guaranteed slice above.
      allRows.sort((a, b) => new Date(a.deadline) - new Date(b.deadline));

      if (!allRows.length) {
        box.innerHTML = '<div class="empty">No relevant solicitations right now.</div>';
        return;
      }

      box.innerHTML = allRows.map(r => {
        const days = daysUntil(r.deadline);
        const deadlineClass = (days !== null && days <= 7) ? 'soon' : '';
        const deadlineText = r.deadline ? new Date(r.deadline).toLocaleDateString() : 'No deadline listed';
        const vertical = (r.vertical || '').toLowerCase();
        const linkHtml = r.action_url
          ? `<a href="${escapeHtml(r.action_url)}" target="_blank" rel="noopener" class="sol-link">View on SAM.gov →</a>`
          : '';
        return `
          <div class="row">
            <div class="row-main">
              <div class="row-title">${escapeHtml(r.title || r.solicitation_id)}</div>
              <div class="sol-id">${escapeHtml(r.solicitation_id || '')}</div>
              <div class="row-summary">${escapeHtml(r.plain_summary || 'No summary available.')}</div>
              ${vertical ? `<span class="tag ${vertical}">${vertical}</span>` : ''}
              ${linkHtml}
            </div>
            <div class="row-meta">
              <div class="deadline ${deadlineClass}">${deadlineText}</div>
              ${days !== null ? `<div style="font-size:11px;color:var(--muted);">${days} day${days===1?'':'s'} left</div>` : ''}
            </div>
          </div>`;
      }).join('');
    } catch (e) {
      box.innerHTML = '<div class="empty">Unable to load procurement data.</div>';
    }
  }

  async function loadGrants() {
    const box = document.getElementById('grants-list');
    try {
      const todayIsoG = new Date().toISOString().slice(0, 10);
      const { data, error } = await sb
        .from('pcm_grant_opportunities')
        .select('opportunity_number, title, agency, close_date, potentially_eligible_for_profit, action_url')
        .eq('potentially_eligible_for_profit', true)
        .gte('close_date', todayIsoG)
        .order('close_date', { ascending: true })
        .limit(25);

      if (error || !data || !data.length) {
        box.innerHTML = '<div class="empty">No possibly-eligible grants right now.</div>';
        return;
      }

      box.innerHTML = data.map(r => {
        const days = daysUntil(r.close_date);
        const deadlineClass = (days !== null && days <= 7) ? 'soon' : '';
        const deadlineText = r.close_date ? new Date(r.close_date).toLocaleDateString() : 'No deadline listed';
        const linkHtml = r.action_url
          ? `<a href="${escapeHtml(r.action_url)}" target="_blank" rel="noopener" class="sol-link">View on Grants.gov →</a>`
          : '';
        return `
          <div class="row">
            <div class="row-main">
              <div class="row-title">${escapeHtml(r.title || r.opportunity_number)}</div>
              <div class="sol-id">${escapeHtml(r.opportunity_number || '')}</div>
              <div class="row-summary">${escapeHtml(r.agency || '')}</div>
              <span class="tag eligible">Possibly Eligible</span>
              ${linkHtml}
            </div>
            <div class="row-meta">
              <div class="deadline ${deadlineClass}">${deadlineText}</div>
              ${days !== null ? `<div style="font-size:11px;color:var(--muted);">${days} day${days===1?'':'s'} left</div>` : ''}
            </div>
          </div>`;
      }).join('');
    } catch (e) {
      box.innerHTML = '<div class="empty">Unable to load grant data.</div>';
    }
  }

  async function loadLeads() {
    const box = document.getElementById('leads-list');
    try {
      const { data, error } = await sb
        .from('pcm_agencies')
        .select('id, contact_name, vertical, leads_delivered, status')
        .order('leads_delivered', { ascending: false })
        .limit(25);

      if (error || !data || !data.length) {
        box.innerHTML = '<div class="empty">No agency lead data available.</div>';
        return;
      }

      box.innerHTML = data.map(r => `
        <div class="row">
          <div class="row-main">
            <div class="row-title">${escapeHtml(r.contact_name || r.id)}</div>
            <div class="row-summary">${escapeHtml((r.vertical || '').replace(/_/g, ' / '))} — ${r.leads_delivered || 0} leads delivered</div>
          </div>
          <div class="row-meta">
            <span class="tag ${r.status === 'active' ? 'eligible' : 'review'}">${escapeHtml(r.status || 'unknown')}</span>
          </div>
        </div>`
      ).join('');
    } catch (e) {
      box.innerHTML = '<div class="empty">Unable to load leads data.</div>';
    }
  }

  async function loadAuctions() {
    const box = document.getElementById('auctions-list');
    try {
      const { data, error } = await sb
        .from('pcm_gsa_auctions')
        .select('sale_no, lot_no, item_name, auction_end_date, property_city, property_state, high_bid_amount, within_budget, action_url')
        .eq('within_budget', true)
        .order('auction_end_date', { ascending: true })
        .limit(25);

      if (error || !data || !data.length) {
        box.innerHTML = '<div class="empty">No matching vehicle auctions within budget right now.</div>';
        return;
      }

      box.innerHTML = data.map(r => {
        const linkHtml = r.action_url
          ? `<a href="${escapeHtml(r.action_url)}" target="_blank" rel="noopener" class="sol-link">View on GSA Auctions →</a>`
          : `<a href="https://gsaauctions.gov/auctions/home" target="_blank" rel="noopener" class="sol-link">Search Sale #${escapeHtml(r.sale_no || '')} on GSA Auctions →</a>`;
        const bidText = (r.high_bid_amount != null) ? `$${Number(r.high_bid_amount).toLocaleString()}` : 'No bids yet';
        return `
          <div class="row">
            <div class="row-main">
              <div class="row-title">${escapeHtml(r.item_name || 'Unnamed item')}</div>
              <div class="sol-id">Sale ${escapeHtml(r.sale_no || '')} — Lot ${escapeHtml(r.lot_no || '')}</div>
              <div class="row-summary">${escapeHtml(r.property_city || '')}, ${escapeHtml(r.property_state || '')} — Current bid: ${bidText}</div>
              <span class="tag eligible">Within Budget</span>
              ${linkHtml}
            </div>
            <div class="row-meta">
              <div class="deadline">${r.auction_end_date ? new Date(r.auction_end_date).toLocaleDateString() : 'No end date'}</div>
            </div>
          </div>`;
      }).join('');
    } catch (e) {
      box.innerHTML = '<div class="empty">Unable to load auction data.</div>';
    }
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str == null ? '' : String(str);
    return div.innerHTML;
  }

  function doLogout() {
    currentUser = null;
    document.getElementById('view-dashboard').style.display = 'none';
    document.getElementById('view-login').style.display = 'block';
    document.getElementById('pin-input').value = '';
    document.getElementById('login-btn').disabled = false;
    document.getElementById('login-btn').textContent = 'ENTER';
    ['section-procurement', 'section-grants', 'section-auctions', 'section-leads'].forEach(id => {
      document.getElementById(id).style.display = 'none';
    });
  }

  document.getElementById('pin-input').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') doLogin();
  });

  window.doLogin = doLogin;
  window.doLogout = doLogout;
})();
</script>

</body>
</html>
